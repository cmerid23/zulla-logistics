<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Zulla Logistics</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #e2e8f0;
      }
      .card {
        max-width: 28rem;
        text-align: center;
        padding: 2rem;
        border-radius: 1rem;
        background: #111835;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0.25rem 0; color: #94a3b8; }
      button {
        margin-top: 1.25rem;
        padding: 0.6rem 1.2rem;
        border-radius: 0.5rem;
        border: 0;
        background: #4f46e5;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Zulla can't reach the network right now.</p>
      <p>Cached data is still available — try again when you're back online.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
